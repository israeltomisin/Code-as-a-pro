        <div class="Big-container" id="big-container">
            <div class="small-container">
                <form>
                    <h5>Registration Form</h5>
                    <p>Kindly fill all fields</p>
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="Fname" aria-describedby="emailHelp" required>
                    </div>

                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Email</label>
                        <input type="email" class="form-control" id="Email" aria-describedby="emailHelp" required>
                    </div>

                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">User Name</label>
                        <input type="text" class="form-control" id="Uname" aria-describedby="emailHelp" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>


                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="exampleCheck1">
                        <label class="form-check-label" for="exampleCheck1">Check me out</label>
                    </div>
                    
                    <button type="button" class="btn btn-primary" id="btn" onclick="Register()">Register</button>
                    <button type="button" class="btn btn-primary" id="clear_btn" onclick="Clear()">Clear</button>
                </form>

                <div class="hidden-form" id="hidden-form">
                    <form action="">
                        <h5>Login Form</h5>
                        <p>Kindly fill all fields</p>
                        <div class="mb-3">
                            <label for="exampleInputEmail1" class="form-label">Email</label>
                            <input type="email" class="form-control" id="Email1" aria-describedby="emailHelp">
                        </div>
                    
                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password1" required>
                        </div>
                        <button type="button" class="btn btn-primary" id="btn" onclick="Login()">Login</button>
                        
                    </form>
                </div>
            </div>
        </div>

        <script>
            // localStorage.setItem("name", "Hi there 👋");
            // // localStorage.setItem("message", "Welcome to JavaScript");
            // alert("Name: " + localStorage.getItem("name"));

            const button = document.getElementById("btn");
            const color = ["#22252d", "red", "blue", "green", "orange", "purple", "indigo", "teal", "maroon", "navy"];
            const randomColor = color[Math.floor(Math.random() * color.length)];
            button.style.backgroundColor = randomColor;
            button.style.color = "white";

            let savedEmail = "";
            let savedPassword = "";
            function Register(){
                
                let Fname = document.getElementById("Fname").value;
                let Email = document.getElementById("Email").value;
                let Uname = document.getElementById("Uname").value;
                let Password = document.getElementById("password").value;
                
                // if (Email.includes("@") && Email.includes(".com")){
                //     alert("Email is valid!!!!!!!!!!!")
                // }
                // else if (!Email.includes("@") || !Email.includes(".com")){
                //     alert("Email is invalid!!!!!!!!!!!")
                // }

                if (Fname == "" || Email == "" || Uname == "" || Password == ""){
                    alert("Fill all fields!!!!!!!!!!!")
                }
                else{

                    savedEmail = Email;
                    savedPassword = Password;

                    alert("Registration successful!!!!!!!!!!!")
                    processForm();

                    // document.querySelector('form').style.display = 'none';
                    // document.getElementById('hidden-form').style.display = 'block';
                }
            }

            

            const processForm =() => {
                    const email = document.getElementById("Email").value;
                    const password = document.getElementById("password").value;
                    const user_name = document.getElementById("Uname").value;
                    const full_name = document.getElementById("Fname").value;

                    let stored_db = localStorage.getItem("database");
                    if(!stored_db){
                        localStorage.setItem("database", '[]');
                    }
                    stored_db = JSON.parse(stored_db);
                    let email_exists = false;
                    
                    stored_db.forEach(dataObj => {
                        if(dataObj['email'] == email){
                            email_exists = true;
                        }
                    })

                    if(email_exists){
                        alert ("This Email Already Exist")
                    }else{
                        const data = {
                            'email': email,
                            'password': password,
                            'user_name': user_name,
                            'full_name': full_name,
                        }
                        stored_db.push(data);

                        stored_db = JSON.stringify(stored_db);
                        const store = localStorage.setItem("database", stored_db);

                    } 

                    stored_db = JSON.parse(localStorage.getItem("database"));

                    let user_name_exists = false;

                    stored_db.forEach(dataObj => {
                        if(dataObj['user_name'] == user_name){
                            user_name_exists = true;
                        }
                    })

                    if(user_name_exists){
                        alert ("This Username Already Exist")
                    }else{
                        const data = {
                            'email': email,
                            'password': password,
                            'user_name': user_name,
                            'full_name': full_name,
                        }

                        stored_db.push(data);

                        stored_db = JSON.stringify(stored_db);
                        const store = localStorage.setItem("database", stored_db);
                    }

                }

                function Clear(){
                    document.getElementById('clear_btn').addEventListener("click", () => {
                        localStorage.clear();
                        console.log("All stored data clear")
                    })
                }

                function Login(){

                    const button = document.getElementById("btn");
                    const color = ["#22252d", "red", "blue", "green", "orange", "purple", "indigo", "teal", "maroon", "navy"];
                    const randomColor = color[Math.floor(Math.random() * color.length)];
                    button.style.backgroundColor = randomColor;
                    button.style.color = "white";

                    // localStorage.setItem("name", "Hi there 👋");
                    // // localStorage.setItem("message", "Welcome to JavaScript");
                    // alert("Name: " + localStorage.getItem("name"));
                    let Email1 = document.getElementById("Email1").value;
                    let Password1 = document.getElementById("password1").value;

                    if (Email1 == savedEmail && Password1 == savedPassword){
                        alert("Login successful!!!!!!!!!!!")
                    }
                    else{
                        alert("Invalid email or password!!!!!!!!!!!")
                    }
                    document.querySelector('form').style.display = 'none';
                    document.getElementById('hidden-form').style.display = 'block';
                }

        </script>
