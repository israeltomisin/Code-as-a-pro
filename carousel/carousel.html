<body>

        </div>


        <div class="hero" id="heroo">
            <div class="card-flex">
                <div class="hero-card" id="image13">13</div>

            <div class="card-flex">
                <div class="hero-card" id="image17">17</div>

                <div class="hero-card" id="image19">19</div>
                <div class="hero-card" id="image20">20</div>

            <div class="card-flex">
                <div class="hero-card" id="image21">21</div>
                <div class="hero-card" id="image22">22</div>
                <div class="hero-card" id="image23">23</div>
                <div class="hero-card" id="image24">24</div>

            <div class="icon">

        </div>
    </section>

    <section class="modal" id="modal">
        <div class="main" id="main"></div>
    </section>

    <script>
        const description = [
            { name: 'Unirii Square, Bucharest, Romania', level: 'The image shows Unirii Square (Piața Unirii), one of the largest and most important public squares in Bucharest, Romania. It is a major city landmark known for its fountains, open spaces, busy streets, and connection to important areas of the city.', picture: 'https://media.istockphoto.com/id/2220083197/photo/unirii-square-in-bucharest-romania.jpg' },

            { name: 'Premium Architecture / Travel Photography', level: 'This image is from Unsplash+, a premium collection of professionally captured photographs. It showcases a high-quality visual suitable for highlighting places, environments, or design concepts.98', picture: 'https://plus.unsplash.com/premium_photo-1661963380682-8fcaf8ca7650' },
            { name: 'Modern Lifestyle / Creative Photography', level: 'This image from Unsplash features a professionally captured visual with a modern aesthetic. It can be used to add a clean and engaging look to websites, blogs, portfolios, presentations, or creative designs.', picture: 'https://images.unsplash.com/photo-1631006995557-9866a74ee05c' },
            { name: 'Premium Travel / Lifestyle Photography', level: 'This image is from Unsplash+, a premium collection of high-quality professional photographs. It presents a polished visual suitable for showcasing experiences, places, or lifestyle themes.', picture: 'https://plus.unsplash.com/premium_photo-1730233719882-890f7043eb9e' },

            { name: 'Wildlife / Animal Photography', level: 'This image from Unsplash captures a natural wildlife scene, highlighting the beauty and character of animals in their environment. It is suitable for nature-related content and visual storytelling.', picture: 'https://images.unsplash.com/photo-1575550959106-5a7defe28b56' },

            { name: 'Luxury Car / Automotive Photography', level: 'This image from Unsplash features an automotive-focused scene, highlighting the design, style, and details of a vehicle. It is suitable for showcasing cars, technology, lifestyle, or premium branding.', picture: 'https://images.unsplash.com/photo-1583121274602-3e2820c69888' },
            { name: 'Architecture / City Photography', level: 'This image from Unsplash features a professionally captured architectural or urban scene, showcasing structures, design, and the atmosphere of a built environment.', picture: 'https://images.unsplash.com/photo-1585589266882-2cb137ba7db6' },
            { name: 'Modern Lifestyle / Creative Photography', level: 'This image from Unsplash features a high-quality photograph with a modern visual style. It can be used to represent lifestyle, creativity, or contemporary themes in digital projects.', picture: 'https://images.unsplash.com/photo-1648413653819-7c0fd93e8e6a' },
            { name: 'Nature / Landscape Photography', level: 'This image from Unsplash showcases a natural outdoor scene with a focus on the beauty of the environment. It can be used to create a calm, scenic, and visually appealing feel.98', picture: 'https://images.unsplash.com/photo-1547394765-185e1e68f34e' },
            { name: 'Modern Travel / Scenic Photography', level: 'This image from Unsplash features a high-quality scenic photograph capturing the atmosphere and details of a place or environment. It is suitable for projects that need a visually engaging and professional look.', picture: 'https://images.unsplash.com/photo-1696710257827-75e2e5954059' },
            { name: 'Education / Learning Environment Photography', level: 'This image from Unsplash represents an educational or learning-focused scene, showing the atmosphere of studying, classrooms, or knowledge sharing.', picture: 'https://images.unsplash.com/photo-1503676260728-1c00da094a0b' },
            { name: 'Travel / City Exploration Photography', level: 'This image from Unsplash captures a travel or urban exploration scene, showcasing the feeling of discovering places and experiencing new environments.', picture: 'https://images.unsplash.com/photo-1552140498-f448ffb1301f' },
            { name: 'Modern Architecture / City Photography', level: 'This image from Unsplash features a professionally captured urban or architectural scene, highlighting modern structures and the character of a built environment.', picture: 'https://images.unsplash.com/photo-1695700440328-088bc97b2db7' },
        ]
        const main = document.getElementById('main');
        const modal = document.getElementById('modal')
        const cards = document.querySelectorAll('.hero-card')
        cards.forEach((card, i) => {
            card.addEventListener('click', (e) => {
                modal.style.display = 'block'
                main.innerHTML =  `
                            <div class="text">
                                <img src="${description[i].picture}"}">
                                <h2>${description[i].name}</h2>
                                <p>${description[i].level}</p>
                            </div>
                         `;
            })
        })

        modal.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        const heroo = document.getElementById("heroo");
        const hero0 = document.getElementById('hero0')
        const preview = document.getElementById('preview')
        const after = document.getElementById('after')
        const previews = document.querySelectorAll('.preview-btn');
        const afters = document.querySelectorAll('.after-btn');

        afters.forEach(btn => {
            btn.addEventListener('click', () => {
                heroo.style.display = 'block';
                hero0.style.display = 'none';
            });
        });
        previews.forEach(btn => {
            btn.addEventListener('click', () => {
                heroo.style.display = 'none';
                hero0.style.display = 'block';
            });
        });
        
    </script>
</body>
</html>
