<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City's weather</title>
    <link rel="stylesheet" href="./city2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
        <nav>
          <div class="logo">
            <h5><img src="./images/logo.png" alt="">Easy~boy</h5>
          </div>
        </nav>
        <section class="hero">
            <div class="hero-bg">
                <div class="hero-text">
                    <div class="card-box">
                        <h4 id="txt" style="color: #0D0D0D;"></h4>
                        <div class="card-flex">
                            <div class="card-dropdown">
                                <ul class="nav-links">
                                    <li class="nav-item dropdown">
                                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                        Location
                                        </a>
                                        <ul class="dropdown-menu">
                                            <li><a class="dropdown-item" href="#" onclick="submit('Lagos')">Lagos</a></li>
                                            <li><a class="dropdown-item" href="#" onclick="submit('Abuja')">Abuja</a></li>
                                            <li><a class="dropdown-item" href="#" onclick="submit('Ibadan')">Ibadan</a></li>
                                            <li><a class="dropdown-item" href="#" onclick="submit('Benin City')">Benin City</a></li>
                                            <li><a class="dropdown-item" href="#" onclick="submit('Ijebu Ode')">Ijebu Ode</a></li>
                                            <li><a class="dropdown-item" href="#" onclick="submit('Jos')">Jos</a></li>
                                            <li><a class="dropdown-item" href="#" onclick="submit('Abeokuta')">Abeokuta</a></li>
                                            <li><a class="dropdown-item" href="#" onclick="submit('Minna')">Minna</a></li>
                                            <li><a class="dropdown-item" href="#" onclick="submit('Sokoto')">Sokoto</a></li>
                                            <li><a class="dropdown-item" href="#" onclick="submit('Ilorin')">Ilorin</a></li>
                                        </ul>
                                    </li>
                                </ul>
                            </div>
                            <div class="card-right">
                                <div class="card-grid">
                                    <div class="row-box">
                                        <h6>Wind direction</h6>
                                        <p id="text3"></p>
                                    </div>
                                    <div class="row-box">
                                        <h6>Humidity</h6>
                                        <p id="text4"></p>
                                    </div>
                                    <div class="row-box">
                                        <h6>Chance of rain</h6>
                                        <p id="text5"></p>
                                    </div>   
                                </div>
                            </div>
                        </div>

                        <div class="grid-row-flex">
                            <div class="grid-row">
                                <div class="row-box">
                                    <h6>Temperature in degree fahrenheit</h6>
                                    <p id="text"></p>
                                </div>
                                <div class="row-box">
                                    <h6>Temperature in degree Celsius</h6>
                                    <!-- <img src="images/fa6-solid--temperature-low.svg" alt=""> -->
                                    <p id="text1"></p>
                                </div>
                                <div class="row-box">
                                    <h6>Cloudy</h6>
                                    <p id="text2"></p>
                                </div>
                            </div>
                            <div class="stormy">
                                <h6 style="color: #0D0D0D;">Stormy <br> with partly cloudy</h6>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </section>

     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
     
    <script>            
      async function submit(city) {

        try {

            const response = await fetch(
                `https://api.weatherapi.com/v1/current.json?key=c5295deed48a464ea55161726261905&q=${city}&aqi=no`
            );

            document.querySelector("#txt").innerHTML =
                `${city} weather condition is below:`;
            const data = await response.json();

            console.log(data);

            document.querySelector("#text").innerHTML =
                `<img src="images/streamline-ultimate-color--temperature-thermometer-high.svg">
                ${data.current.temp_f}°F`;

            document.querySelector("#text1").innerHTML =
                `<img src="images/fa6-solid--temperature-low.svg">
                ${data.current.temp_c}°C`;

            document.querySelector("#text2").innerHTML =
                `<img src="images/mdi--weather-heavy-rain.svg"> 
                ${data.current.condition.text}`;

            document.querySelector("#text3").innerHTML =
                `<img src = "images/mdi--weather-windy.svg">
                ${data.current.wind_dir}`;

            document.querySelector("#text4").innerHTML =
                `<img src="images/lets-icons--humidity.svg" alt="">
                 ${data.current.humidity}%`;
                document.querySelector("#text5").innerHTML =
                `<img src="images/mdi--rain-chance.svg" alt="">
                ${data.current.chance_of_rain}`;

        } catch (error) {

            document.querySelector("#text6").textContent =
                `An error occurred, please try again later.`;

            console.log(error);
        }
      }
    </script>
</body>
</html>
