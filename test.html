        // FUNCTIONS

        const subtract = (sParam1, sParam2, sParam3=0) => {
                const sub = sParam1 - sParam2 - sParam3;
                return sub;
        }

        function greet(param1, param2, param3=0){
                const sum = param1 + param2 + param3;
                const sub = subtract(param1, param2, param3);
                return `Sum: ${sum}, Sub: ${sub}`;
        }

        // CLASSWORK
        function Even(param1){
            const divisible = param1 % 2;
            return divisible;
        }
        function Odd(param1){
            const divisible = param1 % 1;
            return divisible;
        }

        function isEvenOdd(param){
            if(param % 2 == 0){
                return 'even'
            }else{
                return 'odd'
            }
        }

        const num = 609
        const test = isEvenOdd(num);
        test === 'odd'? console.log(`${num} is an odd number`): console.log(`${num} is an even number`)


        // ASSIGNMENT
        function isPrime(param){
            if (param <= 1)
            return false;
        for (let i = 2; i <= Math.sqrt(param); i++){
            if (param % i === 0){
                return false
            }
        }
        return true;
        }
        const num1 = 9
        const run = isPrime(num1)
        run ? console.log('num1 is prime') : console.log('not prime');
