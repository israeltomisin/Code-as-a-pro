    <script>
        const getData = async () => {
            try{
                const response = await fetch("http://api.weatherapi.com/v1/current.json?key=c5295deed48a464ea55161726261905&q=Kaduna&aqi=no")
                const data = await response.json();
                console.log(data);
                document.querySelector("#weather").textContent = `Kaduna's Weather is: ${data.current.temp_f} degrees feranheit`
            }catch(error){
                document.querySelector("#weather").innerHTML = `An error occured, please try again later.`
            }
        }
        

        getData();
    </script>
